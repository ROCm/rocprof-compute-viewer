name: "CodeQL Advanced"

on:
  workflow_dispatch:
  push:
    branches: ["amd-mainline"]
  pull_request:
    branches: ["amd-mainline"]
  schedule:
    - cron: '0 0 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    # Runner size impacts CodeQL analysis time. To learn more, please see:
    #   - https://gh.io/recommended-hardware-resources-for-running-codeql
    #   - https://gh.io/supported-runners-and-hardware-resources
    #   - https://gh.io/using-larger-runners (GitHub.com only)
    # Consider using larger runners or machines with greater resources for possible analysis time improvements.
    runs-on: ubuntu-24.04
    permissions:
      # required for all workflows
      security-events: write

      # required to fetch internal or private CodeQL packs
      packages: read

      # only required for workflows in private repositories
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: c-cpp
          build-mode: manual
        - language: actions
          build-mode: none

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      timeout-minutes: 5

    - name: Install Req
      timeout-minutes: 10
      run: |
        sudo apt update
        sudo apt install -y cmake rpm

    - if: matrix.build-mode == 'manual'
      name: Install Qt
      uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
      timeout-minutes: 15
      with:
        aqtversion: '==3.1.*'
        version: '6.8.0'
        host: 'linux'
        target: 'desktop'
        arch: 'linux_gcc_64'
        cache: true

    - if: matrix.build-mode == 'manual'
      name: Configure CMake
      timeout-minutes: 15
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=RelWithDebInfo -DBUILD_LOCATION=${{github.workspace}}/build

    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      timeout-minutes: 15
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}
        queries: security-extended
        # If you wish to specify custom queries, you can do so here or in a config file.
        # By default, queries listed here will override any specified in a config file.
        # Prefix the list here with "+" to use these queries and those in the config file.

        # For more details on CodeQL's query packs, refer to: https://docs.github.com/en/code-security/code-scanning/automatically-scanning-your-code-for-vulnerabilities-and-errors/configuring-code-scanning#using-queries-in-ql-packs
        # queries: security-extended,security-and-quality

    - if: matrix.build-mode == 'manual'
      name: Build
      timeout-minutes: 15
      run: cmake --build ${{github.workspace}}/build --parallel 4

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      timeout-minutes: 15
      with:
        category: "/language:${{matrix.language}}"
