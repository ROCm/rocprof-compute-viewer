name: Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag Version'
        required: true
        type: string

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release

jobs:
  prepare-release:
    name: Prepare release inputs
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      tag_name: ${{ steps.validate.outputs.tag_name }}
    steps:
    - name: Validate release inputs
      id: validate
      shell: bash
      timeout-minutes: 5
      env:
        TAG_NAME: ${{ inputs.tag_name }}
      run: |
        if [[ -z "$TAG_NAME" ]]; then
          echo "tag_name is required for release creation."
          exit 1
        fi

        if [[ ! "$TAG_NAME" =~ ^[A-Za-z0-9][A-Za-z0-9._/+-]*$ ]]; then
          echo "Release tag contains unsupported characters: ${TAG_NAME}"
          exit 1
        fi

        if ! git check-ref-format "refs/tags/${TAG_NAME}"; then
          echo "Invalid release tag: ${TAG_NAME}"
          exit 1
        fi

        printf 'tag_name=%s\n' "$TAG_NAME" >> "$GITHUB_OUTPUT"

  build:
    name: Preparing the packages
    needs: prepare-release
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        system: [
          {name: 'windows-x86', runner: windows-2022, host: 'windows', arch: 'win64_msvc2022_64', cmake: '', cmd: ''},
          {name: 'macos-x86', runner: macos-15-intel, host: 'mac', arch: 'clang_64', cmake: '-DCMAKE_OSX_ARCHITECTURES=x86_64 -DCMAKE_OSX_DEPLOYMENT_TARGET="12.7.3"', cmd: 'x86'},
          {name: 'ubuntu-22-x86', runner: ubuntu-22.04, host: 'linux', arch: 'linux_gcc_64', cmake: '', cmd: ''},
          {name: 'ubuntu-24-x86', runner: ubuntu-24.04, host: 'linux', arch: 'linux_gcc_64', cmake: '', cmd: ''},
          {name: 'macos-arm64', runner: macos-14, host: 'mac', arch: 'clang_64', cmake: '-DCMAKE_OSX_ARCHITECTURES=arm64 -DCMAKE_OSX_DEPLOYMENT_TARGET="12.7.3"', cmd: 'arm64'}
        ]

    runs-on: ${{ matrix.system.runner }}

    steps:
    - uses: actions/checkout@v6
      timeout-minutes: 5
      with:
        ref: refs/tags/${{ needs.prepare-release.outputs.tag_name }}

    - name: Install Req
      if: ${{ contains(matrix.system.host, 'linux') }}
      timeout-minutes: 10
      run: |
        sudo apt update
        sudo apt install -y cmake rpm

    - name: Install Qt
      uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
      timeout-minutes: 15
      with:
        aqtversion: '==3.1.*'
        version: '6.8.0'
        host: ${{ matrix.system.host }}
        target: 'desktop'
        arch: ${{ matrix.system.arch }}
        cache: true

    - name: Configure CMake
      timeout-minutes: 10
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DBUILD_LOCATION=${{github.workspace}}/build ${{ matrix.system.cmake }}

    - name: Build
      timeout-minutes: 10
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} --parallel 16

    - name: Building Packages
      timeout-minutes: 10
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} --target package --parallel 16

    - name: Rename Packages
      if: ${{ contains(matrix.system.host, 'mac') }}
      timeout-minutes: 5
      run: cd ${{github.workspace}}/build; find . -depth -name "*.sh" -exec sh -c 'f="{}"; mv -- "$f" "${f%.sh}-${{ matrix.system.cmd }}.sh"' \;

    - name: Verify Packages
      shell: bash
      timeout-minutes: 5
      working-directory: ${{github.workspace}}/build
      run: |
        shopt -s nullglob
        packages=( *.exe *.sh *.deb *.rpm *.pkg )
        ls -lah
        if (( ${#packages[@]} == 0 )); then
          echo "No package artifacts found."
          exit 1
        fi
        printf 'Found package artifact: %s\n' "${packages[@]}"

    - name: Archive production artifacts
      uses: actions/upload-artifact@v7
      timeout-minutes: 10
      with:
        name: Binaries_${{ matrix.system.name }}
        path: |
          ${{github.workspace}}/build/*.exe
          ${{github.workspace}}/build/*.sh
          ${{github.workspace}}/build/*.deb
          ${{github.workspace}}/build/*.rpm
          ${{github.workspace}}/build/*.pkg
        retention-days: 30

  release:
    name: Create GitHub Release
    needs:
      - prepare-release
      - build
    strategy:
      fail-fast: false
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: write

    steps:
    - uses: actions/checkout@v6
      timeout-minutes: 5
      with:
        ref: refs/tags/${{ needs.prepare-release.outputs.tag_name }}

    - name: Download release artifacts
      uses: actions/download-artifact@v7
      timeout-minutes: 15
      with:
        pattern: Binaries_*
        path: ./release-assets
        merge-multiple: true

    - name: List Downloaded Artifacts
      timeout-minutes: 5
      run: |
        ls -lah ./release-assets/*

    - name: Create GitHub Release
      timeout-minutes: 15
      env:
        GH_TOKEN: ${{ github.token }}
        TAG_NAME: ${{ needs.prepare-release.outputs.tag_name }}
      run: |
        echo "Creating release for tag: $TAG_NAME"

        ASSET_FILES=()
        for file in ./release-assets/*; do
          if [ -f "$file" ]; then
            ASSET_FILES+=("$file")
          fi
        done

        if [ ${#ASSET_FILES[@]} -eq 0 ]; then
          echo "No asset files found in ./release-assets to upload!"
          exit 1
        fi

        echo "Asset files to upload: ${ASSET_FILES[@]}"

        gh release create "$TAG_NAME" "${ASSET_FILES[@]}" --title "Release $TAG_NAME" --notes-file ./CHANGELOG.md

        echo "GitHub Release $TAG_NAME created successfully."
