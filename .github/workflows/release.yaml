name: Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag Version'
        required: true
        type: string

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release
  ROCM_SDK_VERSION: 7.14.0a20260529

jobs:
  prepare-release:
    name: Prepare release inputs
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      tag_name: ${{ steps.validate.outputs.tag_name }}
    steps:
    - name: Validate release inputs
      id: validate
      shell: bash
      timeout-minutes: 5
      env:
        TAG_NAME: ${{ inputs.tag_name }}
      run: |
        if [[ -z "$TAG_NAME" ]]; then
          echo "tag_name is required for release creation."
          exit 1
        fi

        if [[ ! "$TAG_NAME" =~ ^[A-Za-z0-9][A-Za-z0-9._/+-]*$ ]]; then
          echo "Release tag contains unsupported characters: ${TAG_NAME}"
          exit 1
        fi

        if ! git check-ref-format "refs/tags/${TAG_NAME}"; then
          echo "Invalid release tag: ${TAG_NAME}"
          exit 1
        fi

        printf 'tag_name=%s\n' "$TAG_NAME" >> "$GITHUB_OUTPUT"

  build:
    name: Preparing the packages
    needs: prepare-release
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        system: [
          {name: 'windows-x86', runner: windows-2022, host: 'windows', arch: 'win64_msvc2022_64', cmake: '', cmd: ''},
          {name: 'macos-x86', runner: macos-15-intel, host: 'mac', arch: 'clang_64', cmake: '-DRCV_FETCH_TRACE_DECODER_WITH_DISASSEMBLY=OFF -DCMAKE_OSX_ARCHITECTURES=x86_64 -DCMAKE_OSX_DEPLOYMENT_TARGET="12.7.3"', cmd: 'x86'},
          {name: 'ubuntu-22-x86', runner: ubuntu-22.04, host: 'linux', arch: 'linux_gcc_64', cmake: '-DRCV_FETCH_TRACE_DECODER_WITH_DISASSEMBLY=OFF', cmd: ''},
          {name: 'ubuntu-24-x86', runner: ubuntu-24.04, host: 'linux', arch: 'linux_gcc_64', cmake: '-DRCV_FETCH_TRACE_DECODER_WITH_DISASSEMBLY=OFF', cmd: ''},
          {name: 'macos-arm64', runner: macos-14, host: 'mac', arch: 'clang_64', cmake: '-DRCV_FETCH_TRACE_DECODER_WITH_DISASSEMBLY=OFF -DCMAKE_OSX_ARCHITECTURES="arm64" -DCMAKE_OSX_DEPLOYMENT_TARGET="12.7.3"', cmd: 'arm64'}
        ]

    runs-on: ${{ matrix.system.runner }}

    steps:
    - uses: actions/checkout@v6
      timeout-minutes: 5
      with:
        ref: refs/tags/${{ needs.prepare-release.outputs.tag_name }}

    - name: Install Req
      if: ${{ contains(matrix.system.host, 'linux') }}
      timeout-minutes: 10
      run: |
        sudo apt update
        sudo apt install -y cmake rpm

    # Windows decoder builds use amd_comgr from the ROCm SDK. Linux/macOS keep
    # decoder disassembly disabled.
    - name: Detect system ROCm COMGR
      if: ${{ matrix.system.host == 'windows' }}
      id: system-comgr
      shell: bash
      run: |
        set -euo pipefail
        candidates=()
        if [ -n "${ROCM_PATH:-}" ]; then candidates+=("$ROCM_PATH"); fi
        if [ "${{ matrix.system.host }}" = "linux" ]; then candidates+=("/opt/rocm"); fi

        for rocm_root in "${candidates[@]}"; do
          if [ ! -d "$rocm_root" ] || [ ! -f "$rocm_root/include/amd_comgr/amd_comgr.h" ]; then
            continue
          fi

          if [ "${{ matrix.system.host }}" = "windows" ]; then
            if [ ! -f "$rocm_root/lib/amd_comgr.lib" ] || [ ! -f "$rocm_root/bin/amd_comgr.dll" ]; then
              continue
            fi
            echo "$(cygpath -w "$rocm_root/bin")" >> "$GITHUB_PATH"
          elif [ ! -f "$rocm_root/lib/libamd_comgr.so" ]; then
            continue
          else
            rocm_llvm_lib="$rocm_root/lib/llvm/lib"
            rocm_sysdeps_lib="$rocm_root/lib/rocm_sysdeps/lib"
            if [ -d "$rocm_llvm_lib" ] && [ -d "$rocm_sysdeps_lib" ]; then
              echo "LD_LIBRARY_PATH=$rocm_root/lib:$rocm_llvm_lib:$rocm_sysdeps_lib:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"
              echo "LDFLAGS=-Wl,-rpath-link,$rocm_llvm_lib -Wl,-rpath-link,$rocm_sysdeps_lib ${LDFLAGS:-}" >> "$GITHUB_ENV"
            fi
          fi

          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "ROCM_PATH=$rocm_root" >> "$GITHUB_ENV"
          echo "CMAKE_PREFIX_PATH=$rocm_root" >> "$GITHUB_ENV"
          echo "Using system ROCm COMGR at $rocm_root"
          exit 0
        done

        echo "found=false" >> "$GITHUB_OUTPUT"
        echo "System ROCm COMGR not found; using CI wheel fallback"

    - name: Restore ROCm SDK COMGR cache
      if: ${{ matrix.system.host == 'windows' && steps.system-comgr.outputs.found != 'true' }}
      id: rocm-sdk-cache
      uses: actions/cache/restore@v4
      with:
        path: ${{ runner.temp }}/rocm-sdk-comgr
        key: ${{ matrix.system.host }}-rocm-sdk-comgr-${{ env.ROCM_SDK_VERSION }}-v2

    - name: Install ROCm SDK COMGR
      if: ${{ matrix.system.host == 'windows' && steps.system-comgr.outputs.found != 'true' && steps.rocm-sdk-cache.outputs.cache-hit != 'true' }}
      timeout-minutes: 20
      shell: bash
      run: |
        set -euo pipefail
        if command -v cygpath >/dev/null 2>&1; then
          temp_root="$(cygpath -u "${RUNNER_TEMP}")"
          wheel_platform="win_amd64"
        else
          temp_root="${RUNNER_TEMP}"
          wheel_platform="linux_x86_64"
        fi

        install_root="$temp_root/rocm-sdk-comgr"
        wheel="$temp_root/rocm_sdk_core-${ROCM_SDK_VERSION}-py3-none-${wheel_platform}.whl"
        wheel_url="https://rocm.nightlies.amd.com/whl-multi-arch/rocm_sdk_core-${ROCM_SDK_VERSION}-py3-none-${wheel_platform}.whl"

        rm -rf "$install_root"
        mkdir -p "$install_root"
        curl -L --fail --retry 3 --retry-delay 10 "$wheel_url" -o "$wheel"

        python - "$wheel" "$install_root" <<'PY'
        import shutil
        import sys
        import zipfile
        from pathlib import Path

        def keep(member_name):
            return (
                member_name == "_rocm_sdk_core/bin/amd_comgr.dll"
                or member_name == "_rocm_sdk_core/lib/amd_comgr.lib"
                or member_name.startswith("_rocm_sdk_core/lib/libamd_comgr.so")
                or member_name.startswith("_rocm_sdk_core/lib/llvm/lib/libLLVM.so")
                or member_name.startswith("_rocm_sdk_core/lib/llvm/lib/libclang-cpp.so")
                or member_name.startswith("_rocm_sdk_core/lib/rocm_sysdeps/lib/librocm_sysdeps_z.so")
                or member_name.startswith("_rocm_sdk_core/lib/rocm_sysdeps/lib/librocm_sysdeps_zstd.so")
                or member_name.startswith("_rocm_sdk_core/include/amd_comgr/")
                or member_name.startswith("_rocm_sdk_core/share/doc/amd_comgr/")
            )

        wheel = Path(sys.argv[1])
        install_root = Path(sys.argv[2])
        install_root_resolved = install_root.resolve()
        with zipfile.ZipFile(wheel) as zf:
            for member in zf.infolist():
                if not keep(member.filename):
                    continue
                target = (install_root / member.filename).resolve()
                try:
                    target.relative_to(install_root_resolved)
                except ValueError:
                    raise RuntimeError(f"Refusing to extract {member.filename}")
                if member.is_dir():
                    target.mkdir(parents=True, exist_ok=True)
                else:
                    target.parent.mkdir(parents=True, exist_ok=True)
                    target.write_bytes(zf.read(member))

        # The Linux wheel ships only the versioned SONAME. Add the unversioned
        # linker name so CMake's find_library(NAMES amd_comgr) can find it.
        lib_dir = install_root / "_rocm_sdk_core" / "lib"
        linker_so = lib_dir / "libamd_comgr.so"
        versioned_sos = sorted(lib_dir.glob("libamd_comgr.so.*"))
        if versioned_sos and not linker_so.exists():
            try:
                linker_so.symlink_to(versioned_sos[-1].name)
            except (NotImplementedError, OSError):
                shutil.copy2(versioned_sos[-1], linker_so)
        PY

    - name: Save ROCm SDK COMGR cache
      if: ${{ matrix.system.host == 'windows' && steps.system-comgr.outputs.found != 'true' && steps.rocm-sdk-cache.outputs.cache-hit != 'true' }}
      uses: actions/cache/save@v4
      continue-on-error: true
      with:
        path: ${{ runner.temp }}/rocm-sdk-comgr
        key: ${{ matrix.system.host }}-rocm-sdk-comgr-${{ env.ROCM_SDK_VERSION }}-v2

    - name: Export ROCm SDK path
      if: ${{ matrix.system.host == 'windows' && steps.system-comgr.outputs.found != 'true' }}
      shell: bash
      run: |
        if command -v cygpath >/dev/null 2>&1; then
          rocm_root="$(cygpath -u "${RUNNER_TEMP}")/rocm-sdk-comgr/_rocm_sdk_core"
          echo "$(cygpath -w "$rocm_root/bin")" >> "$GITHUB_PATH"
        else
          rocm_root="${RUNNER_TEMP}/rocm-sdk-comgr/_rocm_sdk_core"
        fi

        echo "ROCM_PATH=$rocm_root" >> "$GITHUB_ENV"
        echo "CMAKE_PREFIX_PATH=$rocm_root" >> "$GITHUB_ENV"
        echo "Using ROCm SDK at $rocm_root"
        if [ "${{ matrix.system.host }}" = "linux" ]; then
          rocm_llvm_lib="$rocm_root/lib/llvm/lib"
          rocm_sysdeps_lib="$rocm_root/lib/rocm_sysdeps/lib"
          echo "LD_LIBRARY_PATH=$rocm_root/lib:$rocm_llvm_lib:$rocm_sysdeps_lib:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"
          echo "LDFLAGS=-Wl,-rpath-link,$rocm_llvm_lib -Wl,-rpath-link,$rocm_sysdeps_lib ${LDFLAGS:-}" >> "$GITHUB_ENV"
        fi

    - name: Verify ROCm SDK COMGR
      if: ${{ matrix.system.host == 'windows' }}
      shell: bash
      run: |
        echo "ROCM_PATH=${ROCM_PATH:-<unset>}"
        if [ -z "${ROCM_PATH:-}" ] || [ ! -d "$ROCM_PATH" ]; then
          echo "::error::ROCm SDK install did not populate ROCM_PATH"
          exit 1
        fi
        test -f "$ROCM_PATH/include/amd_comgr/amd_comgr.h"
        if [ "${{ matrix.system.host }}" = "windows" ]; then
          test -f "$ROCM_PATH/lib/amd_comgr.lib"
          test -f "$ROCM_PATH/bin/amd_comgr.dll"
        else
          test -f "$ROCM_PATH/lib/libamd_comgr.so" || test -f "$ROCM_PATH/lib/libamd_comgr.so.3"
          compgen -G "$ROCM_PATH/lib/llvm/lib/libLLVM.so*" > /dev/null
          compgen -G "$ROCM_PATH/lib/llvm/lib/libclang-cpp.so*" > /dev/null
          compgen -G "$ROCM_PATH/lib/rocm_sysdeps/lib/librocm_sysdeps_z.so*" > /dev/null
          compgen -G "$ROCM_PATH/lib/rocm_sysdeps/lib/librocm_sysdeps_zstd.so*" > /dev/null
        fi
        echo "Verified amd_comgr in $ROCM_PATH"

    - name: Install Qt
      uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
      timeout-minutes: 15
      with:
        aqtversion: '==3.1.*'
        version: '6.8.0'
        host: ${{ matrix.system.host }}
        target: 'desktop'
        arch: ${{ matrix.system.arch }}
        cache: true

    # Configure also builds the rocprof-trace-decoder sub-project at configure
    # time (see cmake/FetchTraceDecoder.cmake), so allow extra wall time.
    - name: Configure CMake
      timeout-minutes: 45
      shell: bash
      run: |
        CMAKE_PREFIX_PATH_ARG=""
        if [ -n "${CMAKE_PREFIX_PATH:-}" ]; then CMAKE_PREFIX_PATH_ARG="-DCMAKE_PREFIX_PATH=$CMAKE_PREFIX_PATH"; fi
        cmake -B "${{github.workspace}}/build" \
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} \
          -DBUILD_LOCATION="${{github.workspace}}/build" \
          $CMAKE_PREFIX_PATH_ARG \
          ${{ matrix.system.cmake }}

    - name: Build
      timeout-minutes: 10
      run: cmake --build "${{github.workspace}}/build" --config "${{env.BUILD_TYPE}}" --parallel 16

    - name: Building Packages
      timeout-minutes: 10
      run: cmake --build "${{github.workspace}}/build" --config "${{env.BUILD_TYPE}}" --target package --parallel 16

    - name: Rename Packages
      if: ${{ contains(matrix.system.host, 'mac') }}
      timeout-minutes: 5
      run: cd ${{github.workspace}}/build; find . -depth -name "*.sh" -exec sh -c 'f="{}"; mv -- "$f" "${f%.sh}-${{ matrix.system.cmd }}.sh"' \;

    - name: Verify Packages
      shell: bash
      timeout-minutes: 5
      working-directory: ${{github.workspace}}/build
      run: |
        shopt -s nullglob
        packages=( *.exe *.sh *.deb *.rpm *.pkg )
        ls -lah
        if (( ${#packages[@]} == 0 )); then
          echo "No package artifacts found."
          exit 1
        fi
        printf 'Found package artifact: %s\n' "${packages[@]}"

    - name: Archive production artifacts
      uses: actions/upload-artifact@v7
      timeout-minutes: 10
      with:
        name: Binaries_${{ matrix.system.name }}
        path: |
          ${{github.workspace}}/build/*.exe
          ${{github.workspace}}/build/*.sh
          ${{github.workspace}}/build/*.deb
          ${{github.workspace}}/build/*.rpm
          ${{github.workspace}}/build/*.pkg
        retention-days: 30

  release:
    name: Create GitHub Release
    needs:
      - prepare-release
      - build
    strategy:
      fail-fast: false
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: write

    steps:
    - uses: actions/checkout@v6
      timeout-minutes: 5
      with:
        ref: refs/tags/${{ needs.prepare-release.outputs.tag_name }}

    - name: Download release artifacts
      uses: actions/download-artifact@v7
      timeout-minutes: 15
      with:
        pattern: Binaries_*
        path: ./release-assets
        merge-multiple: true

    - name: List Downloaded Artifacts
      timeout-minutes: 5
      run: |
        ls -lah ./release-assets/*

    - name: Create GitHub Release
      timeout-minutes: 15
      env:
        GH_TOKEN: ${{ github.token }}
        TAG_NAME: ${{ needs.prepare-release.outputs.tag_name }}
      run: |
        echo "Creating release for tag: $TAG_NAME"

        ASSET_FILES=()
        for file in ./release-assets/*; do
          if [ -f "$file" ]; then
            ASSET_FILES+=("$file")
          fi
        done

        if [ ${#ASSET_FILES[@]} -eq 0 ]; then
          echo "No asset files found in ./release-assets to upload!"
          exit 1
        fi

        echo "Asset files to upload: ${ASSET_FILES[@]}"

        gh release create "$TAG_NAME" "${ASSET_FILES[@]}" --title "Release $TAG_NAME" --notes-file ./CHANGELOG.md

        echo "GitHub Release $TAG_NAME created successfully."
