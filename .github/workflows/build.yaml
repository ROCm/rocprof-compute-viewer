name: CMake

on:
  workflow_dispatch:
  push:
    branches: [amd-mainline]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_name != 'amd-mainline' }}

permissions:
  contents: read

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release
  LLVM_VERSION: 21.1.8

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        system: [
          {name: 'windows-x86', runner: windows-2022, host: 'windows', arch: 'win64_msvc2022_64', cmake: '-DRCV_FETCH_TRACE_DECODER=ON', cmd: ''},
          {name: 'macos-x86', runner: macos-15-intel, host: 'mac', arch: 'clang_64', cmake: '-DCMAKE_OSX_ARCHITECTURES=x86_64 -DCMAKE_OSX_DEPLOYMENT_TARGET="12.7.3"', cmd: 'x86'},
          {name: 'ubuntu-22-x86', runner: ubuntu-22.04, host: 'linux', arch: 'linux_gcc_64', cmake: '-DRCV_FETCH_TRACE_DECODER=ON', cmd: ''},
          {name: 'ubuntu-24-x86', runner: ubuntu-24.04, host: 'linux', arch: 'linux_gcc_64', cmake: '-DRCV_FETCH_TRACE_DECODER=ON', cmd: ''},
          {name: 'macos-arm64', runner: macos-14, host: 'mac', arch: 'clang_64', cmake: '-DCMAKE_OSX_ARCHITECTURES="arm64" -DCMAKE_OSX_DEPLOYMENT_TARGET="12.7.3"', cmd: 'arm64'}
        ]

    runs-on: ${{ matrix.system.runner }}

    steps:
    - uses: actions/checkout@v6
      timeout-minutes: 5

    - name: Install Req
      if: ${{ contains(matrix.system.host, 'linux') }}
      timeout-minutes: 10
      run: |
        sudo apt update
        sudo apt install -y cmake rpm libffi-dev libedit-dev libtinfo-dev zlib1g-dev
        sudo cat /etc/os-release

    # The trace decoder's LLVM disasm backend needs a full LLVM development
    # install (CMake config files + AMDGPU target including the newest chips
    # such as gfx950). Distro LLVM lags upstream by enough that the gfx950
    # subtarget is missing on Ubuntu 24's apt llvm-18. The official LLVM
    # Windows release has both an LLVM-*.exe installer and a clang+llvm-*.tar.xz
    # developer archive. The installer does not include the CMake package and
    # static component libraries needed by the decoder; use the archive there.
    # Pin LLVM 21.x so the AMDGPU backend recognises gfx950.
    - name: Install LLVM (Linux)
      if: ${{ matrix.system.host == 'linux' }}
      uses: KyleMayes/install-llvm-action@ebc0426251bc40c7cd31162802432c68818ab8f0 # v2.0.9
      timeout-minutes: 15
      env:
        ACTIONS_STEP_DEBUG: true
      with:
        version: ${{ env.LLVM_VERSION }}
        directory: ${{ runner.temp }}/llvm
        cached: false

    - name: Install LLVM dev archive (Windows)
      if: ${{ matrix.system.host == 'windows' }}
      timeout-minutes: 20
      shell: bash
      run: |
        set -euo pipefail
        llvm_root="$(cygpath -u "${RUNNER_TEMP}")/llvm"
        llvm_archive="$(cygpath -u "${RUNNER_TEMP}")/llvm-${LLVM_VERSION}-windows-msvc.tar.xz"
        llvm_url="https://github.com/llvm/llvm-project/releases/download/llvmorg-${LLVM_VERSION}/clang%2Bllvm-${LLVM_VERSION}-x86_64-pc-windows-msvc.tar.xz"

        rm -rf "$llvm_root"
        mkdir -p "$llvm_root"
        curl -L --fail --retry 3 --retry-delay 10 "$llvm_url" -o "$llvm_archive"
        tar -xJf "$llvm_archive" -C "$llvm_root" --strip-components=1

        echo "LLVM_PATH=$llvm_root" >> "$GITHUB_ENV"
        echo "$(cygpath -w "$llvm_root/bin")" >> "$GITHUB_PATH"
        echo "Installed LLVM dev archive at $llvm_root"

    # Sanity-check the install: fail here if LLVM_PATH points at a bad tree so
    # the later decoder configure step does not pick a stale system LLVM.
    - name: Verify LLVM install
      if: ${{ matrix.system.host != 'mac' }}
      shell: bash
      run: |
        echo "LLVM_PATH=${LLVM_PATH:-<unset>}"
        if [ -z "${LLVM_PATH:-}" ] || [ ! -d "$LLVM_PATH" ]; then
          echo "::error::LLVM install did not populate LLVM_PATH"
          exit 1
        fi
        echo "--- $LLVM_PATH ---"
        ls -la "$LLVM_PATH"
        echo "--- $LLVM_PATH/lib/cmake (if any) ---"
        ls -la "$LLVM_PATH/lib/cmake" || true
        echo "--- $LLVM_PATH/lib/cmake/llvm (if any) ---"
        ls -la "$LLVM_PATH/lib/cmake/llvm" || true

    # Both install paths export LLVM_PATH pointing at the actual extracted
    # root. Derive LLVM_DIR from that and fail loudly if the CMake config dir
    # is not there; otherwise find_package(LLVM) can silently fall back to a
    # runner-provided LLVM that is too old for gfx950.
    - name: Export LLVM_DIR
      if: ${{ matrix.system.host != 'mac' }}
      shell: bash
      run: |
        if [ -z "${LLVM_PATH:-}" ]; then
          echo "::error::LLVM_PATH not set by LLVM install"; exit 1
        fi
        LLVM_CMAKE_DIR="$LLVM_PATH/lib/cmake/llvm"
        if [ ! -f "$LLVM_CMAKE_DIR/LLVMConfig.cmake" ]; then
          echo "::error::LLVMConfig.cmake not found at $LLVM_CMAKE_DIR"
          ls -la "$LLVM_PATH" || true
          ls -la "$LLVM_PATH/lib/cmake" || true
          exit 1
        fi
        echo "LLVM_DIR=$LLVM_CMAKE_DIR" >> "$GITHUB_ENV"
        echo "Using LLVM_DIR=$LLVM_CMAKE_DIR"

    - name: Install Qt
      uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
      timeout-minutes: 15
      with:
        aqtversion: '==3.1.*'
        version: '6.8.0'
        host: ${{ matrix.system.host }}
        target: 'desktop'
        arch: ${{ matrix.system.arch }}
        cache: true

    # Configure also builds the rocprof-trace-decoder sub-project at configure
    # time (see cmake/FetchTraceDecoder.cmake), so allow extra wall time.
    - name: Configure CMake
      timeout-minutes: 45
      shell: bash
      run: |
        LLVM_DIR_ARG=""
        if [ -n "${LLVM_DIR:-}" ]; then LLVM_DIR_ARG="-DLLVM_DIR=$LLVM_DIR"; fi
        cmake -B "${{github.workspace}}/build" \
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} \
          -DBUILD_LOCATION="${{github.workspace}}/build" \
          $LLVM_DIR_ARG \
          ${{ matrix.system.cmake }}

    - name: Build
      timeout-minutes: 10
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} --parallel 16

    # The tests project re-uses the decoder sub-build cached by the main
    # configure (shared external/ checkout + reused build tree), so this is
    # usually fast — but keep a generous budget for the cold path.
    - name: Configure Tests
      if: ${{ matrix.system.host != 'mac' }}
      timeout-minutes: 30
      shell: bash
      run: |
        LLVM_DIR_ARG=""
        if [ -n "${LLVM_DIR:-}" ]; then LLVM_DIR_ARG="-DLLVM_DIR=$LLVM_DIR"; fi
        cmake -S "${{github.workspace}}/tests" -B "${{github.workspace}}/build-tests" \
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} \
          -DRCV_FETCH_TRACE_DECODER=ON \
          $LLVM_DIR_ARG

    - name: Build Tests
      if: ${{ matrix.system.host != 'mac' }}
      timeout-minutes: 5
      run: cmake --build ${{github.workspace}}/build-tests --config ${{env.BUILD_TYPE}} --parallel 16

    - name: Run Tests
      if: ${{ matrix.system.host != 'mac' }}
      timeout-minutes: 10
      shell: bash
      env:
        QT_QPA_PLATFORM: offscreen
      # On Windows the loader looks at PATH for Qt/LLVM DLLs; on Linux the
      # rpath handles it. Prepending unconditionally is harmless on Linux
      # (the dirs are either empty or unused there).
      run: |
        export PATH="${QT_ROOT_DIR:-}/bin:${LLVM_PATH:-}/bin:$PATH"
        ctest --test-dir ${{github.workspace}}/build-tests --output-on-failure --build-config ${{env.BUILD_TYPE}}

    - name: Building Packages
      timeout-minutes: 10
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} --target package --parallel 16

    - name: Rename Packages
      if: ${{ contains(matrix.system.host, 'mac') }}
      timeout-minutes: 5
      run: cd ${{github.workspace}}/build; find . -depth -name "*.sh" -exec sh -c 'f="{}"; mv -- "$f" "${f%.sh}-${{ matrix.system.cmd }}.sh"' \;

    - name: Verify Packages
      shell: bash
      timeout-minutes: 5
      working-directory: ${{github.workspace}}/build
      run: |
        shopt -s nullglob
        packages=( *.exe *.sh *.deb *.rpm *.pkg )
        ls -lah
        if (( ${#packages[@]} == 0 )); then
          echo "No package artifacts found."
          exit 1
        fi
        printf 'Found package artifact: %s\n' "${packages[@]}"

    - name: Archive production artifacts
      uses: actions/upload-artifact@v7
      timeout-minutes: 10
      with:
        name: Binaries_${{ matrix.system.name }}
        path: |
          ${{github.workspace}}/build/*.exe
          ${{github.workspace}}/build/*.sh
          ${{github.workspace}}/build/*.deb
          ${{github.workspace}}/build/*.rpm
          ${{github.workspace}}/build/*.pkg
        retention-days: 30
